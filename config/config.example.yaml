# ============================================================
# Trading Bot Configuration
# Copy this file to config.yaml and fill in your API keys
# NEVER commit config.yaml with real keys!
# ============================================================

exchange:
  name: binance          # binance, bybit, kucoin
  api_key: "YOUR_API_KEY"
  api_secret: "YOUR_API_SECRET"
  sandbox: true          # USE SANDBOX/TESTNET FIRST!
  rate_limit: true

trading:
  symbol: "BTC/USDT"
  timeframe: "15m"       # 1m, 5m, 15m, 1h, 4h, 1d
  initial_capital: 100   # Starting capital in USDT
  mode: "paper"          # paper, live (START WITH PAPER!)

strategy:
  name: "ensemble"       # ensemble, rsi_macd, mean_reversion, grid, dca_momentum
  params:
    # RSI + MACD Strategy
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    # EMA filter
    ema_period: 50

risk:
  max_position_pct: 0.30       # Max 30% of capital per trade
  stop_loss_pct: 0.03          # 3% stop loss
  take_profit_pct: 0.06        # 6% take profit (2:1 R/R)
  max_daily_loss_pct: 0.05     # 5% max daily loss -> halt
  max_drawdown_pct: 0.25       # 25% max drawdown -> halt
  risk_per_trade_pct: 0.02     # 2% risk per trade
  max_open_trades: 3
  trailing_stop: false
  trailing_stop_pct: 0.02

logging:
  level: "INFO"                # DEBUG, INFO, WARNING, ERROR
  file: "logs/trading.log"
  console: true
