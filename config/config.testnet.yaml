# ============================================================
# TESTNET Configuration — Use this FIRST to validate everything works
# No real money at risk!
#
# Kraken Futures (Canada OK): https://demo-futures.kraken.com
# Bybit Testnet: https://testnet.bybit.com
# Binance Testnet: https://testnet.binancefuture.com
# ============================================================

exchange:
  # CANADA: use krakenfutures (registered MSB, lowest fees)
  # OTHER: use bybit or binance
  name: krakenfutures      # krakenfutures, bybit, binance
  api_key: ""              # Get from testnet/demo site
  api_secret: ""
  sandbox: true            # IMPORTANT: enables testnet mode
  rate_limit: true

trading:
  # krakenfutures uses USD pairs: BTC/USD:USD
  # bybit/binance use USDT pairs: BTC/USDT:USDT
  symbol: "BTC/USD:USD"
  timeframe: "4h"
  initial_capital: 100
  mode: "paper"            # Start with paper, then switch to "live"
  market_type: "futures"
  leverage: 2

strategy:
  name: "trend_following"
  params:
    donchian_entry: 20
    donchian_exit: 10
    atr_period: 14
    atr_stop_mult: 2.0
    volume_confirm: true
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_period: 50

risk:
  max_position_pct: 0.30
  stop_loss_pct: 0.03
  take_profit_pct: 0.06
  max_daily_loss_pct: 0.05
  max_drawdown_pct: 0.25
  risk_per_trade_pct: 0.015
  max_open_trades: 2
  trailing_stop: true
  trailing_stop_pct: 0.02
  loss_cooldown_after: 3

logging:
  level: "INFO"
  file: "logs/testnet.log"
  console: true
